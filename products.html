<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/winnie/icon.png" />
  <title>Products - Online Farm Produce</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <div class="container navbar">
        <a class="brand" href="/winnie/">
          <img src="icon.png" alt="Winnie" />
          Online Farm Produce
        </a>
        <nav class="nav-links">
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" data-theme-toggle>Theme</button>
          <a class="btn btn-ghost" href="/winnie/admin-login.html">Admin Login</a>
          <a class="btn btn-ghost" href="/winnie/cart.html">Cart <span data-cart-count>0</span></a>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="toolbar">
          <div>
            <h2 class="section-title">Product listing</h2>
            <p class="section-subtitle">Search by name, category, price, or location.</p>
          </div>
        </div>

        <div class="card filter-bar">
          <input type="text" placeholder="Search name" />
          <select>
            <option>All categories</option>
            <option>Fruits</option>
            <option>Vegetables</option>
            <option>Herbs</option>
          </select>
          <input type="number" placeholder="Min price (KES)" />
          <input type="number" placeholder="Max price (KES)" />
          <input type="text" placeholder="Location" />
        </div>

        <div class="grid grid-3" style="margin-top: 20px;" data-products="listing"></div>
      </div>
    </main>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
