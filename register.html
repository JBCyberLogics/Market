<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/winnie/icon.png" />
  <title>Register - Online Farm Produce</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <div class="container navbar">
        <a class="brand" href="/winnie/">
          <img src="icon.png" alt="Winnie" />
          Online Farm Produce
        </a>
        <nav class="nav-links">
          <a href="/winnie/login.html">Login</a>
        </nav>
        <div class="nav-actions">
          <a class="btn btn-ghost" href="/winnie/admin-login.html">Admin Login</a>
          <button class="theme-toggle" data-theme-toggle>Theme</button>
        </div>
      </div>
    </header>

    <main class="section auth-layout">
      <div class="container auth-shell">
        <div class="card auth-card">
          <h2 class="section-title">Create your account</h2>
          <p class="section-subtitle">Register as a farmer or buyer. Passwords must be at least 8 characters.</p>
          <form class="form" data-validate data-api="register">
            <div class="input-group">
              <label for="name">Full Name</label>
              <input id="name" name="name" type="text" required />
            </div>
            <div class="input-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div class="input-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" minlength="8" required />
            </div>
            <div class="input-group">
              <label for="role">Role</label>
              <select id="role" name="role" required>
                <option value="farmer">Farmer</option>
                <option value="buyer">Buyer</option>
              </select>
            </div>
            <div class="notice">Your account will be created immediately. Staff may review buyers later.</div>
            <div class="notice" data-form-message style="display: none;"></div>
            <button class="btn btn-primary" type="submit">Register</button>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
