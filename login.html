<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/winnie/icon.png" />
  <title>Login - Online Farm Produce</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <div class="container navbar">
        <a class="brand" href="/winnie/">
          <img src="icon.png" alt="Winnie" />
          Online Farm Produce
        </a>
        <nav class="nav-links">
        </nav>
        <div class="nav-actions">
          <a class="btn btn-ghost" href="/winnie/admin-login.html">Admin Login</a>
          <button class="theme-toggle" data-theme-toggle>Theme</button>
        </div>
      </div>
    </header>

    <main class="section auth-layout">
      <div class="container auth-shell">
        <div class="card auth-card">
          <h2 class="section-title">Welcome back</h2>
          <p class="section-subtitle">Farmers and buyers can sign in here.</p>
          <form class="form" data-validate data-api="login">
            <div class="input-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div class="input-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" minlength="8" required />
            </div>
            <div class="role-select" data-role-prompt hidden>
              <div class="helper">Select your role to continue.</div>
              <div class="role-options">
                <label class="role-pill">
                  <input type="radio" name="role" value="farmer" required />
                  Farmer
                </label>
                <label class="role-pill">
                  <input type="radio" name="role" value="buyer" required />
                  Buyer
                </label>
              </div>
            </div>
            <div class="notice" data-form-message style="display: none;"></div>
            <button class="btn btn-primary" type="submit">Login</button>
            <a class="btn btn-outline" href="/winnie/register.html">Register</a>
          </form>
          <div class="notice" style="margin-top: 16px;">
            New here? <a href="/winnie/register.html">Create an account</a> to continue checkout.
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
