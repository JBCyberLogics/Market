<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/winnie/icon.png" />
  <title>Cart - Online Farm Produce</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <div class="container navbar">
        <a class="brand" href="/winnie/">
          <img src="icon.png" alt="Winnie" />
          Online Farm Produce
        </a>
        <nav class="nav-links">
          <a href="/winnie/products.html">Products</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" data-theme-toggle>Theme</button>
          <a class="btn btn-ghost" href="/winnie/admin-login.html">Admin Login</a>
          <a class="btn btn-ghost" href="/winnie/cart.html">Cart <span data-cart-count>0</span></a>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="toolbar">
          <div>
            <h2 class="section-title">Your cart</h2>
            <p class="section-subtitle">Update quantities and proceed to checkout.</p>
          </div>
          <a class="btn btn-primary" href="/winnie/login.html?redirect=order-confirmation.html">Checkout</a>
        </div>

        <div class="card">
          <table class="table" data-cart-table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Line total</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <div class="toolbar" style="margin-top: 16px;">
            <div class="notice">Payment icons only. No processing is implemented.</div>
            <div>
              <strong>Total:</strong>
              <span data-cart-total>KES 0.00</span>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top: 20px;">
          <h3>Payment options</h3>
          <div class="payment-row">
            <div class="payment-icon">M-Pesa</div>
            <div class="payment-icon">Bank Transfer</div>
            <div class="payment-icon">Cash</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
